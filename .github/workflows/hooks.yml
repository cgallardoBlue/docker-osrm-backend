name: Docker Image CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    environment: master
    env:
      DOCKER_REPO: cgallardo/docker-osrm-backend
      DOCKER_TAG: '5.24'
    strategy:
      matrix:
        version: ['5.24']
        variant: ['debian']

    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Execute CI build hooks
        id: docker_build
        run: |
          # Export variables to tag against GitHub Container Registry
          #export DOCKER_REGISTRY=ghcr.io
          #export DOCKER_REPO=${{ github.repository }}
          cd images/${{ matrix.version }}/${{ matrix.variant }}
          ./hooks/run build ${{ matrix.variant }}

      - name: Display docker images
        run: docker images

      - name: Execute CI test hooks
        id: docker_test
        run: |
          cd images/${{ matrix.version }}/${{ matrix.variant }}
          ./hooks/run test ${{ matrix.variant }}

      - name: Execute CI push hooks
        id: docker_push
        if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
        env:
          DOCKER_LOGIN: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          cd images/${{ matrix.version }}/${{ matrix.variant }}
          ./hooks/run push ${{ matrix.variant }}
